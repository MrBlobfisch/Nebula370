[heater_bed]
sensor_pin: PF3 #first Thermistor
sensor_type: ATC Semitec 104GT-2

[extruder]
sensor_type: PT1000
sensor_pin: PF7

[temperature_sensor Octopus_Pro]
sensor_type: temperature_mcu
gcode_id: OCTOPUS_PRO
min_temp: 10.0
max_temp: 75.0

[temperature_sensor BTT_Pi]
sensor_type: temperature_host
gcode_id: BTT_PI
min_temp: 10.0
max_temp: 75.0

[thermistor NTC_10K]
temperature1: 25
resistance1: 10000
beta: 3435

[temperature_sensor Stepper_Left]
sensor_type: NTC_10K
sensor_pin: PF4 #second Thermistor

[temperature_sensor Stepper_Right]
sensor_type: NTC_10K
sensor_pin: PF5 #third Thermistor

[temperature_sensor Chamber]
sensor_type: ATC Semitec 104GT-2
sensor_pin: PF6 #forth Thermistor