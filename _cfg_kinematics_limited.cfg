[printer]
kinematics: limited_corexy
max_velocity: 1500
max_accel: 80000
max_x_accel: 75000
max_y_accel: 65000
max_z_velocity: 10
max_z_accel: 100
minimum_cruise_ratio: 0
scale_xy_accel: True

[stepper_x] # Driver0, Motor1, X Left Motor
endstop_pin: PG9
position_endstop: 369
position_min: -10
position_max: 369
homing_speed: 150

[stepper_y] # Driver1, Motor 2, Y Right Motor
endstop_pin: PG6
position_endstop: 393
position_min: -10
position_max: 395
homing_speed: 150

[stepper_z] # Driver2, Motor 3, Z Left Motor
endstop_pin: probe:z_virtual_endstop
homing_retract_dist: 0
position_min: -2
position_max: 400